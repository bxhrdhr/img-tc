<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芜湖影视 - 多彩视觉体验</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        :root {
            --color1: #ff3366;
            --color2: #ff9933;
            --color3: #33ccff;
            --color4: #9933ff;
            --light: #ffffff;
            --dark: #f8f9fa;
            --text: #333333;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.6;
            background: linear-gradient(135deg, var(--color1), var(--color2), var(--color3), var(--color4));
            min-height: 100vh;
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* 粉色备选方案 */
        .pink-mode {
            --color1: #ff6b9d;
            --color2: #ff8fab;
            --color3: #ffb3c6;
            --color4: #ffd6e0;
            animation: none;
        }
        
        /* 入场动画 */
        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--light);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeOut 1s ease-in-out 2s forwards;
        }
        
        .loader-content {
            text-align: center;
        }
        
        .loader-logo {
            font-size: 4rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--color1), var(--color2), var(--color3), var(--color4));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        
        .loader-bar {
            width: 300px;
            height: 4px;
            background: rgba(0,0,0,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin: 0 auto;
        }
        
        .loader-progress {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, var(--color1), var(--color2), var(--color3), var(--color4));
            animation: load 2s ease-in-out forwards;
        }
        
        @keyframes load {
            0% { width: 0; }
            100% { width: 100%; }
        }
        
        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }
        
        /* 主容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            opacity: 0;
            animation: fadeIn 1s ease-in-out 2s forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        /* 主内容区 */
        .main-content {
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            padding: 40px;
            margin: 50px 0;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }
        
        /* 标题区域 */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--color1), var(--color2));
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--color1), var(--color2), var(--color3));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        /* 图片展示区 */
        .showcase {
            margin: 40px 0;
            text-align: center;
        }
        
        .showcase-img {
            max-width: 100%;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        
        .showcase-img:hover {
            transform: scale(1.02);
        }
        
        /* 下载按钮 */
        .download-btn {
            display: block;
            width: 250px;
            margin: 40px auto;
            padding: 15px 30px;
            background: linear-gradient(135deg, var(--color1), var(--color2));
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .download-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, var(--color3), var(--color4));
        }
        
        /* 颜色切换按钮 */
        .color-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            z-index: 100;
        }
        
        .color-toggle i {
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--color1), var(--color2), var(--color3), var(--color4));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .title {
                font-size: 2.5rem;
            }
            
            .subtitle {
                font-size: 1rem;
            }
            
            .main-content {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <!-- 入场动画 -->
    <div class="page-loader">
        <div class="loader-content">
            <div class="loader-logo">芜湖影视</div>
            <div class="loader-bar">
                <div class="loader-progress"></div>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="main-content">
            <!-- 标题区域 -->
            <div class="header">
                <div class="logo">芜</div>
                <h1 class="title">芜湖影视</h1>
                <p class="subtitle">多彩视觉，畅享影视盛宴</p>
            </div>
            
            <!-- 图片展示区 -->
            <div class="showcase">
                <img src="tu.jpg" alt="APP界面展示" class="showcase-img">
            </div>
            
            <!-- 下载按钮 -->
            <a href="https://www.123684.com/s/ynz5Vv-hOY3d" class="download-btn">立即下载体验</a>
        </div>
    </div>
    
    <!-- 颜色切换按钮 -->
    <div class="color-toggle" id="colorToggle">
        <i>🎨</i>
    </div>

    <script>
        // 页面加载完成后移除加载动画
        window.addEventListener('load', function() {
            setTimeout(() => {
                document.querySelector('.page-loader').style.display = 'none';
            }, 2000);
        });
        
        // 颜色切换功能
        document.getElementById('colorToggle').addEventListener('click', function() {
            document.body.classList.toggle('pink-mode');
            
            // 随机颜色模式
            if (!document.body.classList.contains('pink-mode')) {
                const colors = [
                    ['#FF3366', '#FF9933', '#33CCFF', '#9933FF'], // 默认
                    ['#FF6B6B', '#FFD166', '#06D6A0', '#118AB2'], // 珊瑚
                    ['#EF476F', '#FFD166', '#06D6A0', '#073B4C'], // 明亮
                    ['#540D6E', '#EE4266', '#FFD23F', '#3BCEAC'], // 鲜艳
                    ['#2B2D42', '#8D99AE', '#EDF2F4', '#EF233C']  // 深色
                ];
                
                const randomColors = colors[Math.floor(Math.random() * colors.length)];
                document.documentElement.style.setProperty('--color1', randomColors[0]);
                document.documentElement.style.setProperty('--color2', randomColors[1]);
                document.documentElement.style.setProperty('--color3', randomColors[2]);
                document.documentElement.style.setProperty('--color4', randomColors[3]);
            }
        });
    </script>
</body>
</html>
