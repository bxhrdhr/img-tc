<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>步数提交</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 新增轮播图的基本样式 */
      .carousel {
            width: 100%;
            overflow: hidden;
            position: relative;
        }

      .carousel img {
            width: 100%;
            display: none;
        }

      .carousel img.active {
            display: block;
        }

      .prev,
      .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 8px;
            cursor: pointer;
            border-radius: 50%;
        }

      .prev {
            left: 10px;
        }

      .next {
            right: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>微信步数提交</h1>

        <form id="stepsForm">
            <label for="account">账号:</label>
            <input type="text" id="account" name="account" required placeholder="输入账号">

            <label for="password">密码:</label>
            <input type="password" id="password" name="password" required placeholder="输入密码">

            <label for="steps">步数:</label>
            <input type="number" id="steps" name="steps" required placeholder="输入步数1~98800">

            <button type="submit">提交</button>
        </form>
        <p id="responseMessage"></p>

        <!-- 轮播图部分 -->
        <div class="carousel">
            <img src="http://yydsmyrj.ct.ws/%e5%88%b7%e6%ad%a5%e6%95%b0/1.jpg" alt="描述文本" class="responsive-image active" data-link="https://link3.cc/lgdmsr">
            <img src="http://yydsmyrj.ct.ws/%e5%88%b7%e6%ad%a5%e6%95%b0/3.jpg" alt="描述文本" class="responsive-image" data-link="https://ka.jayspace.cn/phone/index?id=0365802D7110515BEF0FE539378AC145">
            <img src="http://yydsmyrj.ct.ws/%e5%88%b7%e6%ad%a5%e6%95%b0/2.jpg" alt="描述文本" class="responsive-image" data-link="http://msr-yyds.great-site.net/%E6%8A%96%E9%9F%B3.HTML">
            <div class="prev">&#10094;</div>
            <div class="next">&#10095;</div>
        </div>

    </div>

    <script src="app.js"></script>

    <script>
        // JavaScript实现轮播图切换逻辑
        const carousel = document.querySelector('.carousel');
        const images = carousel.querySelectorAll('img');
        const prevBtn = carousel.querySelector('.prev');
        const nextBtn = carousel.querySelector('.next');
        let currentIndex = 0;

        function showImage(index) {
            images.forEach((img, i) => {
                img.classList.remove('active');
                if (i === index) {
                    img.classList.add('active');
                }
            });
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            showImage(currentIndex);
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            showImage(currentIndex);
        }

        // 给左右按钮添加点击事件监听
        prevBtn.addEventListener('click', prevImage);
        nextBtn.addEventListener('click', nextImage);

        // 自动轮播，每3秒切换一次图片（可根据需要调整时间间隔）
        setInterval(nextImage, 5000);

        // 添加点击图片跳转功能
        images.forEach((img) => {
            img.addEventListener('click', () => {
                const link = img.dataset.link;
                if (link) {
                    window.location.href = link;
                }
            });
        });
    </script>
</body>

</html>
